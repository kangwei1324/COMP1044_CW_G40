<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Internship Result Management System</title>
    <!-- Import Inter Font for Premium Look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- SVG Icons injected inline or via icon sets later. For now, basic CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>University of Nottingham</h1>
                <p>Internship Result Management System</p>
            </div>
            
            <!-- In Phase 4, we will wrap this in a dynamic PHP check for $_SESSION errors -->
            <div class="alert alert-danger" style="display: none;" id="error-alert">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                <span>Invalid username or password.</span>
            </div>

            <!-- Frontend Route Simulation (Post to login_action.php later) -->
            <form action="admin/dashboard.html" method="POST" id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="button" class="btn btn-primary" onclick="simulateLogin()">Sign In</button>
            </form>

            <div style="margin-top: 24px; font-size: 13px; color: var(--text-muted);">
                Protected system for University Staff & Assessors.
            </div>
        </div>
    </div>

    <script>
        // Temporary JS to navigate between mockups
        function simulateLogin() {
            const user = document.getElementById('username').value;
            if(user.toLowerCase() === 'admin') {
                window.location.href = 'admin/dashboard.html';
            } else if(user.toLowerCase() === 'assessor') {
                window.location.href = 'assessor/dashboard.html';
            } else {
                document.getElementById('error-alert').style.display = 'flex';
                document.getElementById('error-alert').querySelector('span').innerText = 'For demo, type "admin" or "assessor".';
            }
        }
    </script>
</body>
</html>
