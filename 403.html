<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>403 Forbidden - IRMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: var(--danger-color);
            line-height: 1;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">403</div>
        <h1 style="margin-bottom: 12px; color: var(--text-dark);">Access Denied</h1>
        <p style="color: var(--text-muted); margin-bottom: 30px; max-width: 400px;">Internal Policy Violation: You do not have the designated administrative permissions to access this module.</p>
        <button class="btn btn-primary" style="width: auto; padding: 12px 30px;" onclick="window.history.back()">Go Back</button>
    </div>
</body>
</html>
